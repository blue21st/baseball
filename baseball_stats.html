<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>野球成績管理</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚾</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #e8c840;
    --accent2: #f97316;
    --text: #f0f4ff;
    --muted: #6b7a99;
    --border: rgba(255,255,255,0.08);
    --green: #22c55e;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent);
  }
  .logo span { color: var(--text); }
  .header-actions { display: flex; gap: 10px; }
  .main { max-width: 1100px; margin: 0 auto; padding: 32px 16px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 28px; background: var(--surface); border-radius: 10px; padding: 4px; width: fit-content; }
  .tab {
    padding: 8px 20px; border-radius: 7px; border: none; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 500;
    background: transparent; color: var(--muted); transition: all 0.2s;
  }
  .tab.active { background: var(--accent); color: #000; }
  .tab:hover:not(.active) { color: var(--text); }

  /* Panel */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Stats overview cards */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 16px;
  }
  .stat-card .label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .stat-card .value { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--accent); }
  .stat-card .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); }
  th {
    padding: 12px 14px; font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted); text-align: center;
    font-weight: 500; white-space: nowrap;
  }
  th:first-child { text-align: left; }
  td {
    padding: 13px 14px; font-size: 14px; text-align: center;
    border-top: 1px solid var(--border); white-space: nowrap;
  }
  td:first-child { text-align: left; font-weight: 500; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .player-num { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--muted); margin-right: 10px; }
  .player-name { font-weight: 700; }
  .player-pos { font-size: 11px; color: var(--muted); }
  .batting-avg { font-family: 'Bebas Neue', sans-serif; font-size: 22px; }
  .avg-high { color: var(--accent); }
  .avg-mid { color: var(--text); }
  .avg-low { color: var(--muted); }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 700; background: var(--surface2); color: var(--muted);
  }

  /* Add Game Form */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; }
  .form-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--accent); margin-bottom: 20px; letter-spacing: 2px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; color: var(--muted); letter-spacing: 0.5px; }
  .form-group input, .form-group select {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; color: var(--text);
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
    transition: border-color 0.2s; outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: var(--surface); }
  .form-section-title {
    font-size: 12px; color: var(--accent2); letter-spacing: 1px;
    text-transform: uppercase; margin: 20px 0 12px;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
    grid-column: 1 / -1;
  }
  .btn {
    padding: 11px 24px; border-radius: 8px; border: none; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 14px;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #f5d825; transform: translateY(-1px); }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: var(--muted); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(239,68,68,0.3); font-size: 12px; padding: 6px 12px; }
  .btn-danger:hover { background: rgba(239,68,68,0.1); }
  .form-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }

  /* Player registration */
  .player-reg-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .game-list { margin-top: 28px; }
  .game-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .game-date { font-size: 12px; color: var(--muted); }
  .game-vs { font-weight: 700; font-size: 15px; }
  .game-score { font-family: 'Bebas Neue', sans-serif; font-size: 22px; }
  .game-score.win { color: var(--green); }
  .game-score.loss { color: var(--red); }
  .game-score.draw { color: var(--muted); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--green); color: #fff; padding: 12px 20px;
    border-radius: 10px; font-size: 14px; font-weight: 500;
    transform: translateY(80px); opacity: 0; transition: all 0.3s;
    z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .sort-btn { cursor: pointer; user-select: none; }
  .sort-btn:hover { color: var(--accent); }

  /* Slide panel */
  .slide-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; }
  .slide-overlay.open { display: block; }
  .slide-panel {
    position: fixed; top: 0; right: 0; height: 100%; width: 460px; max-width: 100%;
    background: var(--surface); border-left: 1px solid var(--border);
    z-index: 201; transform: translateX(100%); transition: transform 0.3s ease;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .slide-panel.open { transform: translateX(0); }
  .slide-panel-header {
    padding: 20px 20px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0;
  }
  .slide-panel-body { flex: 1; overflow-y: auto; padding: 20px; }
  .slide-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .slide-close:hover { color: var(--text); }
  .at-bat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .at-bat-num { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--muted); min-width: 24px; text-align: center; }
  .at-bat-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px; color: var(--text);
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; outline: none;
  }
  .at-bat-input:focus { border-color: var(--accent); }
  .at-bat-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 0 4px; line-height: 1; }
  .at-bat-del:hover { color: var(--red); }
  .btn-add-ab {
    width: 100%; margin-top: 4px; padding: 9px; border-radius: 8px;
    border: 1px dashed var(--border); background: transparent;
    color: var(--muted); font-size: 13px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s;
  }
  .btn-add-ab:hover { border-color: var(--accent); color: var(--accent); }
  .player-section { margin-bottom: 24px; }
  .player-section-title {
    font-size: 13px; font-weight: 700; margin-bottom: 10px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }


  .player-stat-header {
    display: grid; grid-template-columns: 2fr repeat(5,1fr);
    gap: 8px; margin-bottom: 8px; font-size: 10px; color: var(--muted);
    letter-spacing: 1px; text-transform: uppercase; padding: 0 4px; text-align: center;
  }
  .player-stat-header div:first-child { text-align: left; }
  .player-stat-row {
    display: grid; grid-template-columns: 2fr repeat(5,1fr);
    gap: 8px; margin-bottom: 10px; align-items: center;
  }
  .player-stat-name { font-size: 13px; }
  .mobile-label { display: none; }
  @media (max-width:600px) { .mobile-label { display: block; } }

  @media (max-width: 600px) {
    .player-stat-header { display: none; }
    .player-stat-row {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto;
      background: var(--surface2); border-radius: 10px; padding: 12px; margin-bottom: 10px; gap: 8px;
    }
    .player-stat-name {
      grid-column: 1 / -1; font-size: 14px; font-weight: 700;
      padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }
    .player-stat-row input {
      position: relative;
    }
    .player-stat-row input::before { content: attr(data-label); }
  }

  /* ===== Responsive ===== */
  @media (max-width: 600px) {
    .main { padding: 16px 10px; }

    /* タブ：全幅に広げて均等配置 */
    .tabs { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); }
    .tab { padding: 9px 4px; font-size: 12px; text-align: center; }

    /* 試合入力：打席数フォームを縦2列に */
    .form-grid { grid-template-columns: 1fr; }
    .form-card { padding: 18px 14px; }
    .player-reg-grid { grid-template-columns: 1fr 1fr; }

    /* 成績テーブル：横スクロール許可 */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* 選手管理テーブル操作ボタン縦並び */
    .player-reg-grid { grid-template-columns: 1fr 1fr; }

    /* スライドパネル：全幅 */
    .slide-panel { width: 100%; border-left: none; border-top: 1px solid var(--border); }

    /* サマリーカード：2列 */
    .stats-grid { grid-template-columns: repeat(2, 1fr); }

    /* フォームアクション */
    .form-actions { flex-direction: column; }
    .form-actions .btn { width: 100%; text-align: center; }

    /* 試合記録：横スクロール */
    #game-list-wrap > div { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* ヘッダー */
    header { padding: 0 12px; }
    .logo { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">⚾ BALL<span>STATS</span></div>

</header>

<div class="main">
  <div class="tabs">
    <button class="tab" onclick="switchTab('register')">選手管理</button>
    <button class="tab" onclick="switchTab('add')">試合入力</button>
    <button class="tab" onclick="switchTab('games')">試合記録</button>
    <button class="tab active" onclick="switchTab('stats')">成績一覧</button>
  </div>

  <!-- 成績一覧 -->
  <div class="panel active" id="panel-stats">
    <div class="stats-grid" id="overview-cards"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="text-align:left">選手</th>
            <th class="sort-btn" onclick="sortTable('avg')">打率 ▾</th>
            <th class="sort-btn" onclick="sortTable('pa')">打席</th>
            <th class="sort-btn" onclick="sortTable('ab')">打数</th>
            <th class="sort-btn" onclick="sortTable('h')">安打</th>
            <th class="sort-btn" onclick="sortTable('rbi')">打点</th>
            <th class="sort-btn" onclick="sortTable('score')">得点</th>
            <th class="sort-btn" onclick="sortTable('sba')">盗塁企図</th>
            <th class="sort-btn" onclick="sortTable('sb')">盗塁</th>
            <th class="sort-btn" onclick="sortTable('g')">試合</th>
          </tr>
        </thead>
        <tbody id="stats-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- 試合記録 -->
  <div class="panel" id="panel-games">
    <div id="game-list-wrap"></div>
  </div>

  <!-- 試合入力 -->
  <div class="panel" id="panel-add">
    <div class="form-card">
      <div class="form-title">試合成績を入力</div>
      <div class="form-grid">
        <div class="form-group">
          <label>試合日</label>
          <input type="date" id="game-date">
        </div>
        <div class="form-group">
          <label>対戦相手</label>
          <input type="text" id="game-opponent" placeholder="○○チーム">
        </div>
        <div class="form-group">
          <label>自チーム得点</label>
          <input type="number" id="game-score-us" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label>相手チーム得点</label>
          <input type="number" id="game-score-them" min="0" placeholder="0">
        </div>
      </div>

      <div class="form-section-title">選手別成績</div>
      <div id="player-stats-form"></div>

      <div class="form-actions">
        <button class="btn btn-outline" onclick="clearForm()">クリア</button>
        <button class="btn btn-primary" onclick="saveGame()">保存する</button>
      </div>
    </div>
  </div>

  <!-- 選手管理 -->
  <div class="panel" id="panel-register">
    <div class="form-card" style="margin-bottom:20px">
      <div class="form-title">選手を追加</div>
      <div class="player-reg-grid">
        <div class="form-group">
          <label>背番号</label>
          <input type="number" id="reg-number" min="0" max="99" placeholder="0">
        </div>
        <div class="form-group">
          <label>氏名</label>
          <input type="text" id="reg-name" placeholder="山田 太郎">
        </div>
        <div class="form-group">
          <label>ポジション</label>
          <select id="reg-pos">
            <option>投手</option><option>捕手</option><option>内野手</option><option>外野手</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="addPlayer()">追加</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th style="text-align:left">背番号</th><th style="text-align:left">氏名</th><th>ポジション</th><th>操作</th></tr></thead>
        <tbody id="player-list-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="slide-overlay" id="slide-overlay" onclick="closeSlide()"></div>
<div class="slide-panel" id="slide-panel">
  <div class="slide-panel-header">
    <div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);letter-spacing:2px;" id="slide-title">打席詳細</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;" id="slide-subtitle"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="btn btn-primary" style="font-size:13px;padding:7px 18px;" onclick="saveSlide()">保存</button>
      <button class="btn btn-outline" style="font-size:13px;padding:7px 14px;" onclick="closeSlide()">戻る</button>
      <button class="slide-close" onclick="closeSlide()">✕</button>
    </div>
  </div>
  <div class="slide-panel-body" id="slide-body"></div>
</div>


<script>
// --- Data ---
let players = JSON.parse(localStorage.getItem('bs_players') || '[]');
let games = JSON.parse(localStorage.getItem('bs_games') || '[]');
let sortKey = 'avg', sortDir = -1;

function save() {
  localStorage.setItem('bs_players', JSON.stringify(players));
  localStorage.setItem('bs_games', JSON.stringify(games));
}

const HIT_RESULTS = ['ヒット','2塁打','3塁打','本塁打'];
const NO_AB_RESULTS = ['四球','死球','犠打','犠飛'];

function getResult(val) {
  // "左2塁打" → "2塁打"、"三ゴロ" → "ゴロ"、"四球" → "四球"
  if (!val) return '';
  for (const p of AB_POSITIONS) {
    if (val.startsWith(p)) return val.slice(p.length);
  }
  return val;
}
function isHit(val) {
  const res = getResult(val);
  return HIT_RESULTS.some(h => res === h);
}
function isAB(val) {
  if (!val || !val.trim()) return false;
  const res = getResult(val);
  return !NO_AB_RESULTS.some(n => res === n);
}
function countHits(atBats) {
  return (atBats||[]).filter(r => isHit(r)).length;
}
function countAB(atBats) {
  return (atBats||[]).filter(r => isAB(r)).length;
}

function playerStats(pid) {
  let pa=0,ab=0,h=0,rbi=0,score=0,sba=0,sb=0,g=0;
  games.forEach(game => {
    const s = game.stats.find(s=>s.pid===pid);
    if (s) {
      pa    += s.pa||0;
      ab    += countAB(s.atBats);
      h     += countHits(s.atBats);
      rbi   += s.rbi||0;
      score += s.score||0;
      sba   += s.sba||0;
      sb    += s.sb||0;
      g++;
    }
  });
  return {pa,ab,h,rbi,score,sba,sb,g, avg: ab>0 ? h/ab : 0};
}

function avgClass(a) {
  if (a >= 0.3) return 'avg-high';
  if (a >= 0.2) return 'avg-mid';
  return 'avg-low';
}

function fmtAvg(a) {
  if (a === 0) return '.000';
  return ('.' + Math.round(a*1000).toString().padStart(3,'0'));
}

// --- Render Stats ---
function renderStats() {
  // Overview
  let totalRBI=0,totalSB=0,totalH=0,totalAB=0;
  players.forEach(p => { const s=playerStats(p.id); totalRBI+=s.rbi; totalSB+=s.sb; totalH+=s.h; totalAB+=s.ab; });
  const teamAvg = totalAB>0 ? totalH/totalAB : 0;
  document.getElementById('overview-cards').innerHTML = `
    <div class="stat-card"><div class="label">チーム打率</div><div class="value">${fmtAvg(teamAvg)}</div><div class="sub">シーズン通算</div></div>
    <div class="stat-card"><div class="label">総安打</div><div class="value">${totalH}</div><div class="sub">${totalAB}打数</div></div>
    <div class="stat-card"><div class="label">総打点</div><div class="value">${totalRBI}</div></div>
    <div class="stat-card"><div class="label">総盗塁</div><div class="value">${totalSB}</div></div>
    <div class="stat-card"><div class="label">試合数</div><div class="value">${games.length}</div></div>
  `;

  // Table — updated columns
  let rows = players.map(p => ({p, s: playerStats(p.id)}));
  rows.sort((a,b) => {
    let va = a.s[sortKey] ?? 0, vb = b.s[sortKey] ?? 0;
    return (va - vb) * sortDir;
  });

  document.getElementById('stats-tbody').innerHTML = rows.length ? rows.map(({p,s}) => `
    <tr>
      <td><span class="player-num">${p.number}</span><span class="player-name">${p.name}</span><br><span class="player-pos">${p.pos}</span></td>
      <td><span class="batting-avg ${avgClass(s.avg)}">${fmtAvg(s.avg)}</span></td>
      <td>${s.pa}</td>
      <td>${s.ab}</td>
      <td>${s.h}</td>
      <td>${s.rbi}</td>
      <td>${s.score}</td>
      <td>${s.sba}</td>
      <td>${s.sb}</td>
      <td>${s.g}</td>
    </tr>
  `).join('') : `<tr><td colspan="10"><div class="empty-state"><div class="empty-icon">⚾</div>選手を登録してください</div></td></tr>`;
}

function sortTable(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = -1; }
  renderStats();
}

// --- Render Games ---
function renderGames() {
  const wrap = document.getElementById('game-list-wrap');
  if (!games.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>試合記録がありません</p></div>`;
    return;
  }
  const sorted = [...games].sort((a,b) => b.date.localeCompare(a.date));
  const th = (t) => `<th style="padding:8px 10px;font-size:10px;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted);text-align:center;font-weight:500;white-space:nowrap;">${t}</th>`;
  const td = (t) => `<td style="padding:8px 10px;text-align:center;font-size:13px;white-space:nowrap;">${t}</td>`;
  const numInp = (id, val) => `<input type="number" min="0" max="99" value="${val}" id="${id}"
    style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px;color:var(--text);font-size:13px;text-align:center;width:100%;font-family:inherit;outline:none">`;

  wrap.innerHTML = sorted.map(g => {
    const id = Number(g.id);
    const res = g.us > g.them ? 'win' : g.us < g.them ? 'loss' : 'draw';
    const label = res==='win'?'勝':res==='loss'?'負':'引';
    const color = res==='win'?'var(--green)':res==='loss'?'var(--red)':'var(--muted)';
    const gameH   = g.stats.reduce((acc,x)=>acc+countHits(x.atBats),0);
    const gameAB  = g.stats.reduce((acc,x)=>acc+countAB(x.atBats),0);
    const gameRBI = g.stats.reduce((acc,x)=>acc+(x.rbi||0),0);
    const gameSB  = g.stats.reduce((acc,x)=>acc+(x.sb||0),0);
    const gameAvg = gameAB>0 ? fmtAvg(gameH/gameAB) : '.000';

    const playerRows = [...players].sort((a,b)=>a.number-b.number).map(p => {
      const s = g.stats.find(s=>s.pid===p.id);
      if (!s || s.pa===0) return '';
      const abCount = (s.atBats||[]).filter(a=>a&&a.trim()).length;
      const playerH = countHits(s.atBats);
      return `<tr style="border-top:1px solid var(--border);">
        <td style="padding:8px 10px;font-size:13px;white-space:nowrap;">
          <span class="player-num" style="font-size:15px">${p.number}</span>${p.name}
        </td>
        ${td(s.pa)}${td(playerH)}${td(s.rbi||0)}${td(s.score||0)}${td(s.sba||0)}${td(s.sb||0)}
        <td style="padding:8px 10px;text-align:center;">
          <button class="btn btn-outline" style="font-size:11px;padding:4px 10px;white-space:nowrap;"
            onclick="openAtBats(${id},${p.id})">
            打席詳細 ${abCount>0?'('+abCount+')':''}
          </button>
        </td>
      </tr>`;
    }).filter(Boolean).join('');

    // edit form player rows
    const editPlayerRows = [...players].sort((a,b)=>a.number-b.number).map(p => {
      const s = g.stats.find(s=>s.pid===p.id) || {pa:0,ab:0,h:0,rbi:0,score:0,sba:0,sb:0};
      return `<div style="display:grid;grid-template-columns:2fr repeat(5,1fr);gap:8px;margin-bottom:10px;align-items:center;">
        <div style="font-size:13px;"><span class="player-num">${p.number}</span>${p.name}</div>
        ${numInp(`edit-gps-${id}-${p.id}-pa`,   s.pa||0)}
        ${numInp(`edit-gps-${id}-${p.id}-rbi`,  s.rbi||0)}
        ${numInp(`edit-gps-${id}-${p.id}-score`,s.score||0)}
        ${numInp(`edit-gps-${id}-${p.id}-sba`,  s.sba||0)}
        ${numInp(`edit-gps-${id}-${p.id}-sb`,   s.sb||0)}
      </div>`;
    }).join('');

    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;">
      <!-- 表示行 -->
      <div id="game-view-${id}" style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface2);flex-wrap:wrap;gap:8px;">
        <div>
          <span style="font-size:12px;color:var(--muted);">${g.date}</span>
          <span style="font-size:16px;font-weight:700;margin-left:12px;">vs ${g.opponent}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <span style="font-size:12px;color:var(--muted);">打率 <span style="color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:16px;">${gameAvg}</span></span>
          <span style="font-size:12px;color:var(--muted);">安打 <span style="color:var(--text);font-weight:700;">${gameH}</span></span>
          <span style="font-size:12px;color:var(--muted);">打点 <span style="color:var(--text);font-weight:700;">${gameRBI}</span></span>
          <span style="font-size:12px;color:var(--muted);">盗塁 <span style="color:var(--text);font-weight:700;">${gameSB}</span></span>
          <span style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:${color};margin-left:4px;">${g.us} - ${g.them}</span>
          <span style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:${color};color:#fff;font-weight:700;font-size:13px;">${label}</span>
          <button class="btn btn-outline" style="font-size:12px;padding:6px 12px;" onclick="editGame(${id})">編集</button>
          <button class="btn btn-danger" onclick="deleteGame(${id})">削除</button>
        </div>
      </div>
      <!-- 編集フォーム -->
      <div id="game-edit-${id}" style="display:none;padding:16px 18px;background:var(--surface2);border-bottom:1px solid var(--border);">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
          <div class="form-group"><label>試合日</label><input type="date" id="edit-gdate-${id}" value="${g.date}"></div>
          <div class="form-group"><label>対戦相手</label><input type="text" id="edit-gopp-${id}" value="${g.opponent}"></div>
          <div class="form-group"><label>自チーム得点</label><input type="number" id="edit-gus-${id}" min="0" value="${g.us}"></div>
          <div class="form-group"><label>相手チーム得点</label><input type="number" id="edit-gthem-${id}" min="0" value="${g.them}"></div>
        </div>
        <div style="display:grid;grid-template-columns:2fr repeat(5,1fr);gap:8px;margin-bottom:8px;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:0 4px;text-align:center;">
          <div style="text-align:left;">選手</div><div>打席</div><div>打点</div><div>得点</div><div>盗企</div><div>盗塁</div>
        </div>
        ${editPlayerRows}
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:10px;">
          <button class="btn btn-outline" style="font-size:13px;" onclick="cancelGameEdit(${id})">キャンセル</button>
          <button class="btn btn-primary" style="font-size:13px;" onclick="saveGameEdit(${id})">保存</button>
        </div>
      </div>
      ${playerRows ? `
      <div id="game-detail-${id}" style="display:none;">
        <table style="width:100%;border-collapse:collapse;">
          <thead style="background:var(--bg);">
            <tr>
              ${th('選手')}${th('打席')}${th('安打')}${th('打点')}${th('得点')}${th('盗企')}${th('盗塁')}${th('')}
            </tr>
          </thead>
          <tbody>${playerRows}</tbody>
        </table>
      </div>
      <div style="text-align:center;padding:8px;">
        <button class="btn btn-outline" style="font-size:12px;padding:5px 16px;" onclick="toggleDetail(${id})">
          <span id="game-detail-label-${id}">選手詳細を表示 ▾</span>
        </button>
      </div>` : `<p style="padding:16px;color:var(--muted);font-size:13px;text-align:center;">選手データなし</p>`}
    </div>`;
  }).join('');
}

let _openDetails = new Set();

function toggleDetail(id) {
  const el = document.getElementById(`game-detail-${id}`);
  const label = document.getElementById(`game-detail-label-${id}`);
  const open = el.style.display === 'none';
  el.style.display = open ? 'block' : 'none';
  label.textContent = open ? '選手詳細を隠す ▴' : '選手詳細を表示 ▾';
  if (open) _openDetails.add(id); else _openDetails.delete(id);
}

function deleteGame(id) {
  id = Number(id);
  if (!confirm('この試合記録を削除しますか？')) return;
  games = games.filter(g => Number(g.id) !== id);
  save(); renderAll(); showToast('削除しました');
}

function editGame(id) {
  id = Number(id);
  const g = games.find(g => Number(g.id) === id);
  if (!g) return;
  document.getElementById(`game-view-${id}`).style.display = 'none';
  document.getElementById(`game-edit-${id}`).style.display = 'block';
}

function cancelGameEdit(id) {
  id = Number(id);
  document.getElementById(`game-view-${id}`).style.display = 'flex';
  document.getElementById(`game-edit-${id}`).style.display = 'none';
}

function saveGameEdit(id) {
  id = Number(id);
  const g = games.find(g => Number(g.id) === id);
  if (!g) return;
  const date = document.getElementById(`edit-gdate-${id}`).value;
  const opponent = document.getElementById(`edit-gopp-${id}`).value.trim();
  const us = parseInt(document.getElementById(`edit-gus-${id}`).value) || 0;
  const them = parseInt(document.getElementById(`edit-gthem-${id}`).value) || 0;
  if (!date || !opponent) { alert('試合日と対戦相手を入力してください'); return; }
  g.date = date; g.opponent = opponent; g.us = us; g.them = them;
  // update player stats
  [...players].forEach(p => {
    let s = g.stats.find(s => s.pid === p.id);
    if (!s) { s = {pid:p.id,pa:0,rbi:0,score:0,sba:0,sb:0,atBats:[]}; g.stats.push(s); }
    s.pa    = parseInt(document.getElementById(`edit-gps-${id}-${p.id}-pa`)?.value) || 0;
    s.rbi   = parseInt(document.getElementById(`edit-gps-${id}-${p.id}-rbi`)?.value) || 0;
    s.score = parseInt(document.getElementById(`edit-gps-${id}-${p.id}-score`)?.value) || 0;
    s.sba   = parseInt(document.getElementById(`edit-gps-${id}-${p.id}-sba`)?.value) || 0;
    s.sb    = parseInt(document.getElementById(`edit-gps-${id}-${p.id}-sb`)?.value) || 0;
  });
  save(); renderAll(); showToast('試合を更新しました');
}

// --- Add Game Form ---
function renderAddForm() {

      <span style="font-size:9px;color:var(--muted);text-align:center;letter-spacing:0.5px;text-transform:uppercase;" class="mobile-label">${lbl}</span>

      <div style="text-align:left;">選手</div><div>打席</div><div>打点</div><div>得点</div><div>盗企</div><div>盗塁</div>
    </div>
    ${sorted.map(p => `
    <div style="display:grid;grid-template-columns:2fr repeat(5,1fr);gap:8px;margin-bottom:10px;align-items:center;">
      <div class="player-stat-name"><span class="player-num">${p.number}</span>${p.name}</div>

function clearForm() {
  document.getElementById('game-opponent').value = '';
  document.getElementById('game-score-us').value = '';
  document.getElementById('game-score-them').value = '';
  players.forEach(p => {
    ['pa','rbi','score','sba','sb'].forEach(k => {
      const el = document.getElementById(`ps-${p.id}-${k}`);
      if (el) el.value = 0;
    });
  });
}

function saveGame() {
  const date = document.getElementById('game-date').value;
  const opponent = document.getElementById('game-opponent').value.trim();
  const us = parseInt(document.getElementById('game-score-us').value) || 0;
  const them = parseInt(document.getElementById('game-score-them').value) || 0;
  if (!date || !opponent) { alert('試合日と対戦相手を入力してください'); return; }
  const sorted = [...players].sort((a,b) => a.number - b.number);
  const stats = sorted.map(p => ({
    pid: p.id,
    pa:    parseInt(document.getElementById(`ps-${p.id}-pa`)?.value)||0,
    rbi:   parseInt(document.getElementById(`ps-${p.id}-rbi`)?.value)||0,
    score: parseInt(document.getElementById(`ps-${p.id}-score`)?.value)||0,
    sba:   parseInt(document.getElementById(`ps-${p.id}-sba`)?.value)||0,
    sb:    parseInt(document.getElementById(`ps-${p.id}-sb`)?.value)||0,
    atBats: [],
  }));
  games.push({ id: Date.now(), date, opponent, us, them, stats });
  save(); renderAll();
  clearForm();
  showToast('試合を保存しました！');
  switchTab('games');
}

// --- At-bat picker data ---
const AB_POSITIONS = ['投','捕','一','二','三','遊','左','中','右'];
const AB_RESULTS   = ['ゴロ','ライナー','フライ','ファールフライ','ヒット','2塁打','3塁打','本塁打','空振り三振','見逃し三振','四球','死球','犠打','犠飛','打撃妨害','走塁妨害','エラー','フィルダースチョイス'];

const HIT_RESULTS  = ['ヒット','2塁打','3塁打','本塁打'];
const NO_AB_RESULTS = ['四球','死球','犠打','犠飛','打撃妨害','走塁妨害'];

// Parse "三ゴロ" -> {pos:'三', res:'ゴロ'} or free text
function parseAtBat(val) {
  if (!val) return {pos:'', res:''};
  for (const p of AB_POSITIONS) {
    for (const r of AB_RESULTS) {
      if (val === p+r) return {pos:p, res:r};
    }
  }
  return {pos:'', res:val};
}
function fmtAtBat(pos, res) {
  if (!pos && !res) return '';
  if (pos && res) return pos+res;
  return res||pos;
}

// --- Slide panel: at-bats ---
let _slideGameId = null;

let _slideFocusPid = null;
function openAtBats(gameId, focusPid) {
  _slideGameId = gameId;
  _slideFocusPid = focusPid || null;
  const g = games.find(g => g.id === gameId);
  if (!g) return;
  document.getElementById('slide-title').textContent = 'vs ' + g.opponent;
  document.getElementById('slide-subtitle').textContent = g.date + ' ／ ' + g.us + ' - ' + g.them;
  renderSlideBody();
  document.getElementById('slide-overlay').classList.add('open');
  document.getElementById('slide-panel').classList.add('open');
}

function renderSlideBody() {
  const g = games.find(g => g.id === _slideGameId);
  if (!g) return;
  const body = document.getElementById('slide-body');
  const sortedStats = [...players].sort((a,b) => a.number - b.number).map(p => {
    let stat = g.stats.find(s => s.pid === p.id);
    if (!stat) { stat = {pid: p.id, pa: 0, rbi:0, score:0, sba:0, sb:0, atBats: []}; g.stats.push(stat); }
    if (!stat.atBats) stat.atBats = [];
    return {p, stat};
  }).filter(({p, stat}) => {
    if (_slideFocusPid) return p.id === _slideFocusPid;
    return stat.pa > 0 || stat.atBats.length > 0;
  });

  if (!sortedStats.length) {
    body.innerHTML = '<p style="color:var(--muted);font-size:14px;text-align:center;padding:40px 0">打席数が入力されている選手がいません。<br>試合入力で打席数を入力してください。</p>';
    return;
  }

  body.innerHTML = sortedStats.map(({p, stat}) => {
    const count = Math.max(stat.pa, stat.atBats.length);
    const rows = Array.from({length: count}, (_,i) => {
      const {pos, res} = parseAtBat(stat.atBats[i]);
      const posOpts = ['', ...AB_POSITIONS].map(v =>
        `<option value="${v}"${v===pos?' selected':''}>${v||'なし'}</option>`).join('');
      const resOpts = ['', ...AB_RESULTS].map(v =>
        `<option value="${v}"${v===res?' selected':''}>${v||'—'}</option>`).join('');
      const sel = `background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 6px;color:var(--text);font-size:13px;font-family:inherit;outline:none;cursor:pointer;`;
      return `<div class="at-bat-row">
        <span class="at-bat-num" style="min-width:52px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--muted);">第${i+1}打席</span>
        <select style="${sel}width:72px;" onchange="setAtBatPos(${_slideGameId},${p.id},${i},this.value)">${posOpts}</select>
        <select style="${sel}flex:1;" onchange="setAtBatRes(${_slideGameId},${p.id},${i},this.value)">${resOpts}</select>
        <button class="at-bat-del" onclick="removeAtBat(${_slideGameId},${p.id},${i})">×</button>
      </div>`;
    }).join('');

    return `<div class="player-section">
      <div class="player-section-title">
        <span style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted)">${p.number}</span>
        <span>${p.name}</span>
        <span style="font-size:11px;color:var(--muted);margin-left:4px;">${p.pos}</span>
        <span style="margin-left:auto;font-size:11px;color:var(--muted)">${stat.atBats.filter(a=>a&&a.trim()).length} / ${stat.pa} 打席</span>
      </div>
      ${rows}
      <button class="btn-add-ab" onclick="addAtBat(${_slideGameId},${p.id})">＋ 打席を追加</button>
    </div>`;
  }).join('');
}

function setAtBatPos(gameId, pid, idx, posVal) {
  const g = games.find(g => g.id === gameId);
  const stat = g.stats.find(s => s.pid === pid);
  const {res} = parseAtBat(stat.atBats[idx]);
  stat.atBats[idx] = fmtAtBat(posVal, res);
  save();
}

function setAtBatRes(gameId, pid, idx, resVal) {
  const g = games.find(g => g.id === gameId);
  const stat = g.stats.find(s => s.pid === pid);
  const {pos} = parseAtBat(stat.atBats[idx]);
  stat.atBats[idx] = fmtAtBat(pos, resVal);
  save();
}

function addAtBat(gameId, pid) {
  const g = games.find(g => g.id === gameId);
  const stat = g.stats.find(s => s.pid === pid);
  if (!stat.atBats) stat.atBats = [];
  stat.atBats.push('');
  stat.pa = Math.max(stat.pa, stat.atBats.length);
  save();
  renderSlideBody();
}

function removeAtBat(gameId, pid, idx) {
  const g = games.find(g => g.id === gameId);
  const stat = g.stats.find(s => s.pid === pid);
  stat.atBats.splice(idx, 1);
  save();
  renderSlideBody();
}

function saveSlide() {
  save();
  showToast('打席詳細を保存しました');
}

function closeSlide() {
  document.getElementById('slide-overlay').classList.remove('open');
  document.getElementById('slide-panel').classList.remove('open');
  const closedGameId = _slideGameId;
  _slideGameId = null;
  renderAll();
  // 閉じる前に開いていた詳細を復元
  _openDetails.forEach(id => {
    const el = document.getElementById(`game-detail-${id}`);
    const label = document.getElementById(`game-detail-label-${id}`);
    if (el) { el.style.display = 'block'; label.textContent = '選手詳細を隠す ▴'; }
  });
}

// --- Utils ---
function renderAll() { renderStats(); renderGames(); renderPlayerList(); renderAddForm(); }

function switchTab(name) {
  const names = ['register','add','games','stats'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i]===name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  if (name==='add') renderAddForm();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓ ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderAll();
</script>
</body>
