<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>野球成績管理 - SEIRYO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #e8c840;
    --accent2: #f97316;
    --text: #f0f4ff;
    --muted: #6b7a99;
    --border: rgba(255,255,255,0.08);
    --green: #22c55e;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; overflow-x: hidden; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; height: 60px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--accent); }
  .main { max-width: 1100px; margin: 0 auto; padding: 20px 12px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface); border-radius: 10px; padding: 4px; }
  .tab { flex: 1; padding: 10px 4px; border-radius: 7px; border: none; cursor: pointer; font-size: 12px; font-weight: 700; background: transparent; color: var(--muted); }
  .tab.active { background: var(--accent); color: #000; }

  /* Panel */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; min-width: 450px; }
  th { padding: 12px; font-size: 10px; color: var(--muted); background: var(--surface2); text-align: center; }
  td { padding: 12px; font-size: 13px; border-top: 1px solid var(--border); text-align: center; }
  
  /* Form Elements */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .form-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); margin-bottom: 16px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  input, select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: var(--text); font-size: 14px; outline: none; }
  
  /* Buttons */
  .btn { padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; font-size: 13px; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--red); color: #fff; }

  /* Toast */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--green); color: #fff; padding: 10px 20px; border-radius: 20px; transition: 0.3s; z-index: 999; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="lock-screen" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="background:var(--surface);padding:30px;border-radius:16px;text-align:center;width:80%;max-width:300px;">
    <div style="font-family:'Bebas Neue';font-size:30px;color:var(--accent);margin-bottom:20px;">BALLSTATS</div>
    <input type="password" id="pw-input" placeholder="Password" style="text-align:center;margin-bottom:10px;">
    <button onclick="checkPassword()" class="btn btn-primary" style="width:100%;">LOGIN</button>
  </div>
</div>

<div id="app-content" style="display:none;">
  <header><div class="logo">⚾ BALLSTATS SEIRYO</div></header>
  <div class="main">
    <div class="tabs">
      <button class="tab active" id="tab-stats" onclick="switchTab('stats')">累計成績</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">選手管理</button>
      <button class="tab" id="tab-games" onclick="switchTab('games')">試合一覧</button>
    </div>

    <div class="panel active" id="panel-stats">
      <div class="table-wrap">
        <table>
          <thead><tr><th style="text-align:left">選手</th><th>打席</th><th>得点</th><th>打点</th><th>盗企</th><th>盗塁</th></tr></thead>
          <tbody id="stats-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="panel" id="panel-games">
      <button class="btn btn-primary" style="width:100%;margin-bottom:16px;" onclick="switchTab('add-game')">＋ 新しい試合を登録</button>
      <div id="game-list-wrap"></div>
    </div>

    <div class="panel" id="panel-add-game">
      <div class="form-card">
        <div class="form-title">試合登録</div>
        <div class="form-group"><label>日付</label><input type="date" id="game-date"></div>
        <div class="form-group"><label>対戦相手</label><input type="text" id="game-opponent" placeholder="相手チーム名"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div class="form-group"><label>自軍スコア</label><select id="game-score-us"></select></div>
          <div class="form-group"><label>敵軍スコア</label><select id="game-score-them"></select></div>
        </div>
        <div style="display:flex;gap:10px;margin-top:10px;">
          <button class="btn btn-outline" style="flex:1;" onclick="switchTab('games')">戻る</button>
          <button class="btn btn-primary" style="flex:1;" onclick="saveGame()">登録する</button>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-edit-stats">
      <div class="form-card">
        <div class="form-title" id="edit-stats-title">成績入力</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th style="text-align:left">選手</th><th>打席</th><th>得点</th><th>打点</th><th>盗企</th><th>盗塁</th></tr></thead>
            <tbody id="player-edit-stats-list"></tbody>
          </table>
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="updateGameStats()">成績を保存する</button>
      </div>
    </div>

    <div class="panel" id="panel-register">
      <button class="btn btn-primary" style="width:100%;margin-bottom:16px;" onclick="switchTab('add-player')">＋ 選手を追加</button>
      <div class="table-wrap">
        <table>
          <thead><tr><th>背番号</th><th style="text-align:left;">氏名</th><th>位置</th><th>操作</th></tr></thead>
          <tbody id="player-list-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="panel" id="panel-add-player">
      <div class="form-card">
        <div class="form-title">選手登録</div>
        <div class="form-group"><label>背番号</label><select id="reg-number"></select></div>
        <div class="form-group"><label>氏名</label><input type="text" id="reg-name" placeholder="選手名"></div>
        <div class="form-group"><label>ポジション</label><select id="reg-pos"><option>投手</option><option>捕手</option><option>内野手</option><option>外野手</option></select></div>
        <button class="btn btn-primary" style="width:100%;margin-top:10px;" onclick="addPlayer()">登録する</button>
        <button class="btn btn-outline" style="width:100%;margin-top:8px;" onclick="switchTab('register')">キャンセル</button>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbySJYE7XzjON6Vyn1dGcBPzw2kRXatzcPSrSzXrrTr0CDpSaq4uQy7Yaml1Y7Ggx2p9FA/exec';
const CORRECT_PASSWORD = 'seiryo';
let players = [], games = [], _currentEditingGameId = null;

// 0〜99の選択肢を生成する関数
function fillSelect(id, start, end, selected = 0) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = "";
  for (let i = start; i <= end; i++) {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = i;
    if (i === selected) opt.selected = true;
    el.appendChild(opt);
  }
}

function checkPassword() {
  if (document.getElementById('pw-input').value === CORRECT_PASSWORD) {
    sessionStorage.setItem('bs_auth_seiryo', '1');
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    loadFromGAS();
  }
}

async function loadFromGAS() {
  showToast('読み込み中...');
  try {
    const res = await fetch(GAS_URL);
    const data = await res.json();
    players = data.players || []; games = data.games || [];
    renderAll();
    showToast('完了');
  } catch(e) { showToast('通信エラー'); }
}

async function saveToGAS(type, data) {
  await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type, data }) });
}

function renderAll() {
  const sortedP = [...players].sort((a,b) => a.number - b.number);
  
  // 累計成績
  document.getElementById('stats-tbody').innerHTML = sortedP.map(p => {
    let pa=0, sc=0, rb=0, sa=0, sb=0;
    games.forEach(g => {
      const s = (g.stats || []).find(st => st.pid === p.id);
      if(s) { pa+=Number(s.pa); sc+=Number(s.score); rb+=Number(s.rbi); sa+=Number(s.sba); sb+=Number(s.sb); }
    });
    return `<tr><td style="text-align:left;"><b>${p.number}</b> ${p.name}</td><td>${pa}</td><td>${sc}</td><td>${rb}</td><td>${sa}</td><td>${sb}</td></tr>`;
  }).join('');

  // 試合一覧
  document.getElementById('game-list-wrap').innerHTML = games.map(g => `
    <div class="form-card" style="display:flex;justify-content:space-between;align-items:center;">
      <div><div style="font-size:11px;color:var(--muted)">${g.date}</div><div style="font-weight:bold">vs ${g.opponent}</div></div>
      <div style="text-align:right;">
        <div style="font-family:'Bebas Neue';font-size:22px;color:var(--accent)">${g.us} - ${g.them}</div>
        <button class="btn btn-outline" style="padding:4px 8px;font-size:11px;" onclick="openStatsEditor(${g.id})">成績入力</button>
      </div>
    </div>
  `).reverse().join('');

  // 選手一覧
  document.getElementById('player-list-tbody').innerHTML = sortedP.map(p => `
    <tr id="prow-${p.id}">
      <td>${p.number}</td><td style="text-align:left">${p.name}</td><td>${p.pos}</td>
      <td><button class="btn btn-outline" style="padding:4px 8px;font-size:11px;" onclick="editPlayerMode(${p.id})">編集</button></td>
    </tr>
  `).join('');
}

function openStatsEditor(gameId) {
  _currentEditingGameId = gameId;
  const game = games.find(g => g.id === gameId);
  document.getElementById('edit-stats-title').textContent = `vs ${game.opponent} 成績`;
  const sortedP = [...players].sort((a,b) => a.number - b.number);
  
  document.getElementById('player-edit-stats-list').innerHTML = sortedP.map(p => {
    const s = (game.stats || []).find(st => st.pid === p.id) || {pa:0, score:0, rbi:0, sba:0, sb:0};
    return `<tr>
      <td style="text-align:left;font-size:11px;">${p.name}</td>
      <td><select id="pa-${p.id}">${genOpts(s.pa)}</select></td>
      <td><select id="sc-${p.id}">${genOpts(s.score)}</select></td>
      <td><select id="rb-${p.id}">${genOpts(s.rbi)}</select></td>
      <td><select id="sa-${p.id}">${genOpts(s.sba)}</select></td>
      <td><select id="sb-${p.id}">${genOpts(s.sb)}</select></td>
    </tr>`;
  }).join('');
  switchTab('edit-stats');
}

function genOpts(sel) {
  let h = ""; for(let i=0; i<=20; i++) h += `<option value="${i}" ${i==sel?'selected':''}>${i}</option>`; return h;
}

async function updateGameStats() {
  const g = games.find(x => x.id === _currentEditingGameId);
  g.stats = players.map(p => ({
    pid: p.id,
    pa: document.getElementById(`pa-${p.id}`).value,
    score: document.getElementById(`sc-${p.id}`).value,
    rbi: document.getElementById(`rb-${p.id}`).value,
    sba: document.getElementById(`sa-${p.id}`).value,
    sb: document.getElementById(`sb-${p.id}`).value
  }));
  await saveToGAS('games', games);
  renderAll(); switchTab('games'); showToast('保存しました');
}

async function saveGame() {
  const opp = document.getElementById('game-opponent').value; if(!opp) return;
  const g = { id: Date.now(), date: document.getElementById('game-date').value, opponent: opp, us: document.getElementById('game-score-us').value, them: document.getElementById('game-score-them').value, stats: [] };
  games.push(g);
  await saveToGAS('games', games);
  renderAll(); switchTab('games'); showToast('登録完了');
}

async function addPlayer() {
  const n = document.getElementById('reg-name').value; if(!n) return;
  players.push({ id: Date.now(), number: document.getElementById('reg-number').value, name: n, pos: document.getElementById('reg-pos').value });
  await saveToGAS('players', players);
  renderAll(); switchTab('register'); showToast('追加しました');
}

function editPlayerMode(id) {
  const p = players.find(x => x.id === id);
  const prow = document.getElementById(`prow-${id}`);
  prow.innerHTML = `<td colspan="3"><input type="text" id="en-${id}" value="${p.name}" style="padding:4px;"></td>
    <td><button class="btn btn-danger" style="padding:4px 8px;font-size:11px;" onclick="deletePlayer(${id})">削除</button></td>`;
}

async function deletePlayer(id) {
  if(!confirm('削除しますか？')) return;
  players = players.filter(p => p.id !== id);
  await saveToGAS('players', players); renderAll();
}

function switchTab(name) {
  ['stats', 'register', 'games'].forEach(b => {
    const el = document.getElementById(`tab-${b}`);
    if(el) el.classList.toggle('active', b === name || (b==='games' && (name==='add-game'||name==='edit-stats')) || (b==='register' && name==='add-player'));
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
}

function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('game-date').value = new Date().toISOString().split('T')[0];
  fillSelect('reg-number', 0, 99, 1);
  fillSelect('game-score-us', 0, 50, 0);
  fillSelect('game-score-them', 0, 50, 0);
  if (sessionStorage.getItem('bs_auth_seiryo') === '1') {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    loadFromGAS();
  }
});
</script>
</body>
</html>
