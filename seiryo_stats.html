<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>野球成績管理 - SEIRYO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235;
    --accent: #e8c840; --text: #f0f4ff; --muted: #6b7a99;
    --border: rgba(255,255,255,0.08); --green: #22c55e; --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; overflow-x: hidden; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; height: 60px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); }
  .main { max-width: 1100px; margin: 0 auto; padding: 12px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 15px; background: var(--surface); border-radius: 10px; padding: 4px; }
  .tab { flex: 1; padding: 12px 4px; border-radius: 7px; border: none; cursor: pointer; font-size: 11px; font-weight: 700; background: transparent; color: var(--muted); }
  .tab.active { background: var(--accent); color: #000 !important; }

  /* Panel Control */
  .panel { display: none !important; }
  .panel.active { display: block !important; }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; margin-bottom: 15px; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; min-width: 600px; }
  th { padding: 10px; font-size: 10px; color: var(--muted); background: var(--surface2); text-align: center; }
  td { padding: 10px; font-size: 13px; border-top: 1px solid var(--border); text-align: center; }
  
  /* Cards */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 12px; }
  .form-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--accent); margin-bottom: 12px; }
  select, input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: var(--text); font-size: 16px; outline: none; }
  
  .btn { padding: 12px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; font-size: 13px; display: inline-block; text-align: center; width: 100%; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); width: auto; }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); font-size: 11px; padding: 5px 10px; width: auto; }

  /* At Bat Details */
  .at-bat-row { display: grid; grid-template-columns: 20px 1fr 1.5fr; gap: 4px; align-items: center; background: var(--surface2); padding: 6px; border-radius: 6px; margin-top: 4px; }
  .at-bat-num { font-size: 10px; color: var(--accent); font-weight: bold; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--green); color: #fff; padding: 10px 20px; border-radius: 25px; transition: 0.3s; z-index: 999; font-size: 12px; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="lock-screen" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="background:var(--surface);padding:30px;border-radius:16px;text-align:center;width:85%;max-width:300px;">
    <div style="font-family:'Bebas Neue';font-size:28px;color:var(--accent);margin-bottom:20px;">BALLSTATS SEIRYO</div>
    <input type="password" id="pw-input" placeholder="Password" style="text-align:center;margin-bottom:15px;">
    <button onclick="checkPassword()" class="btn btn-primary">LOGIN</button>
  </div>
</div>

<div id="app-content" style="display:none;">
  <header><div class="logo">⚾ BALLSTATS SEIRYO</div></header>
  <div class="main">
    <div class="tabs">
      <button class="tab active" id="tab-stats" onclick="switchTab('stats')">成績一覧</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">選手管理</button>
      <button class="tab" id="tab-games" onclick="switchTab('games')">試合一覧</button>
    </div>

    <div class="panel active" id="panel-stats">
      <div class="table-wrap">
        <table>
          <thead><tr><th style="text-align:left">選手</th><th>打率</th><th>打席</th><th>安打</th><th>得点</th><th>打点</th><th>盗塁</th></tr></thead>
          <tbody id="stats-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="panel" id="panel-games">
      <button class="btn btn-primary" style="margin-bottom:15px;" onclick="switchTab('add-game')">＋ 試合登録</button>
      <div id="game-list-wrap"></div>
    </div>

    <div class="panel" id="panel-add-game">
      <div class="form-card">
        <div class="form-title">新規試合登録</div>
        <div style="margin-bottom:10px;"><label style="font-size:11px;color:var(--muted);">日付</label><input type="date" id="game-date"></div>
        <div style="margin-bottom:10px;"><label style="font-size:11px;color:var(--muted);">対戦相手</label><input type="text" id="game-opponent" placeholder="相手チーム"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px;">
          <div><label style="font-size:11px;color:var(--muted);">自軍</label><select id="game-score-us"></select></div>
          <div><label style="font-size:11px;color:var(--muted);">敵軍</label><select id="game-score-them"></select></div>
        </div>
        <button class="btn btn-primary" onclick="saveGame()">登録して一覧へ</button>
        <button class="btn btn-outline" style="width:100%;margin-top:8px;border-color:#333;color:#666;" onclick="switchTab('games')">キャンセル</button>
      </div>
    </div>

    <div class="panel" id="panel-edit-stats">
      <div class="form-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
          <div class="form-title" id="edit-stats-title" style="margin-bottom:0;">成績入力</div>
          <button class="btn btn-outline" style="padding:5px 10px;font-size:11px;" onclick="switchTab('games')">戻る</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th style="text-align:left">選手</th><th>打席詳細 (方向/結果)</th><th>得点</th><th>打点</th><th>盗企</th><th>盗塁</th></tr></thead>
            <tbody id="player-edit-stats-list"></tbody>
          </table>
        </div>
        <button class="btn btn-primary" onclick="updateGameStats()">成績を保存する</button>
      </div>
    </div>

    <div class="panel" id="panel-register">
      <button class="btn btn-primary" style="margin-bottom:15px;" onclick="switchTab('add-player')">＋ 選手を追加</button>
      <div class="table-wrap">
        <table>
          <thead><tr><th>背番号</th><th style="text-align:left;">氏名</th><th>位置</th><th>操作</th></tr></thead>
          <tbody id="player-list-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="panel" id="panel-add-player">
      <div class="form-card">
        <div class="form-title">選手登録</div>
        <div style="margin-bottom:10px;"><label style="font-size:11px;color:var(--muted);">背番号</label><select id="reg-number"></select></div>
        <div style="margin-bottom:10px;"><label style="font-size:11px;color:var(--muted);">氏名</label><input type="text" id="reg-name" placeholder="例：山田 太郎"></div>
        <div style="margin-bottom:15px;"><label style="font-size:11px;color:var(--muted);">位置</label><select id="reg-pos"><option>投手</option><option>捕手</option><option>内野手</option><option>外野手</option></select></div>
        <button class="btn btn-primary" onclick="addPlayer()">登録</button>
        <button class="btn btn-outline" style="width:100%;margin-top:8px;border-color:#333;color:#666;" onclick="switchTab('register')">キャンセル</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = '
