<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>野球成績管理 - SEIRYO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #e8c840;
    --accent2: #f97316;
    --text: #f0f4ff;
    --muted: #6b7a99;
    --border: rgba(255,255,255,0.08);
    --green: #22c55e;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent);
  }
  .logo span { color: var(--text); }
  .main { max-width: 1100px; margin: 0 auto; padding: 32px 16px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 28px; background: var(--surface); border-radius: 10px; padding: 4px; width: fit-content; }
  .tab {
    padding: 8px 20px; border-radius: 7px; border: none; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 500;
    background: transparent; color: var(--muted); transition: all 0.2s;
  }
  .tab.active { background: var(--accent); color: #000; }

  /* Panel */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Stats overview cards */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 16px;
  }
  .stat-card .label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .stat-card .value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent); }

  /* Table Container (Scrollable on mobile) */
  .table-wrap { 
    background: var(--surface); 
    border: 1px solid var(--border); 
    border-radius: 14px; 
    overflow-x: auto; 
    -webkit-overflow-scrolling: touch;
    margin-bottom: 20px;
  }
  table { width: 100%; border-collapse: collapse; min-width: 500px; }
  thead { background: var(--surface2); }
  th {
    padding: 12px 14px; font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted); text-align: center;
    font-weight: 500; white-space: nowrap;
  }
  th:first-child { text-align: left; }
  td {
    padding: 13px 14px; font-size: 14px; text-align: center;
    border-top: 1px solid var(--border); white-space: nowrap;
  }
  td:first-child { text-align: left; font-weight: 500; }
  .player-num { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--muted); margin-right: 10px; }

  /* Forms */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
  .form-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--accent); margin-bottom: 20px; letter-spacing: 2px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; color: var(--muted); }
  .form-group input, .form-group select {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; color: var(--text);
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; outline: none;
    width: 100%;
  }

  /* Number Stepper (for Uniform Number) */
  .stepper { display: flex; align-items: center; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; width: fit-content; }
  .stepper button { width: 40px; height: 40px; border: none; background: var(--surface2); color: white; cursor: pointer; font-size: 18px; }
  .stepper input { width: 50px; border: none; background: transparent; color: white; text-align: center; font-size: 16px; }

  .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; font-size: 14px; transition: 0.2s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--red); color: white; }
  .form-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--green); color: #fff; padding: 12px 20px; border-radius: 10px; transform: translateY(80px); transition: 0.3s; z-index: 999; }
  .toast.show { transform: translateY(0); }

  @media (max-width: 600px) {
    .tabs { width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); }
    .tab { padding: 10px 2px; font-size: 12px; }
    .form-grid { grid-template-columns: 1fr; }
    .stat-card .value { font-size: 24px; }
  }
</style>
</head>
<body>

<div id="lock-screen" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 32px;width:90%;max-width:360px;text-align:center;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--accent);letter-spacing:3px;margin-bottom:8px;">⚾ BALLSTATS</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:28px;">SEIRYO ログイン</div>
    <input type="password" id="pw-input" placeholder="パスワード" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;color:white;text-align:center;margin-bottom:12px;">
    <button onclick="checkPassword()" class="btn btn-primary" style="width:100%;">ログイン</button>
  </div>
</div>

<div id="app-content" style="display:none;">
<header>
  <div class="logo">⚾ BALL<span>STATS</span></div>
</header>

<div class="main">
  <div class="tabs">
    <button class="tab active" id="tab-stats" onclick="switchTab('stats')">累計成績</button>
    <button class="tab" id="tab-register" onclick="switchTab('register')">選手管理</button>
    <button class="tab" id="tab-games" onclick="switchTab('games')">試合一覧</button>
  </div>

  <div class="panel active" id="panel-stats">
    <div class="stats-grid" id="overview-cards"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="text-align:left">選手</th>
            <th>打席</th><th>得点</th><th>打点</th><th>盗企</th><th>盗塁</th>
          </tr>
        </thead>
        <tbody id="stats-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="panel" id="panel-games">
    <div style="display:flex; justify-content:flex-end; margin-bottom:16px;">
      <button class="btn btn-primary" onclick="switchTab('add-game')">＋ 試合を追加</button>
    </div>
    <div id="game-list-wrap"></div>
  </div>

  <div class="panel" id="panel-add-game">
    <div class="form-card">
      <div class="form-title">試合登録</div>
      <div class="form-grid">
        <div class="form-group"><label>日付</label><input type="date" id="game-date"></div>
        <div class="form-group"><label>対戦相手</label><input type="text" id="game-opponent" placeholder="相手チーム"></div>
        <div class="form-group"><label>自軍得点</label><input type="number" id="game-score-us" value="0"></div>
        <div class="form-group"><label>敵軍得点</label><input type="number" id="game-score-them" value="0"></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-outline" onclick="switchTab('games')">キャンセル</button>
        <button class="btn btn-primary" onclick="saveGame()">保存して次へ</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-edit-stats">
    <div class="form-card">
      <div class="form-title" id="edit-stats-title">選手成績入力</div>
      <div style="overflow-x: auto; margin-bottom: 20px;">
        <div style="min-width: 450px;">
          <div style="display:grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr 1fr; gap:8px; font-size:10px; color:var(--muted); text-align:center; padding-bottom:10px; border-bottom:1px solid var(--border);">
            <div style="text-align:left">選手</div><div>打席</div><div>得点</div><div>打点</div><div>盗企</div><div>盗塁</div>
          </div>
          <div id="player-edit-stats-list" style="margin-top:10px;"></div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" style="width:100%" onclick="updateGameStats()">成績を保存する</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-register">
    <div style="display:flex; justify-content:flex-end; margin-bottom:16px;">
      <button class="btn btn-primary" onclick="switchTab('add-player')">＋ 選手を追加</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>背番号</th><th style="text-align:left;">氏名</th><th>位置</th><th>操作</th></tr></thead>
        <tbody id="player-list-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="panel" id="panel-add-player">
    <div class="form-card">
      <div class="form-title">選手登録</div>
      <div class="form-grid">
        <div class="form-group">
          <label>背番号 (0-99)</label>
          <div class="stepper">
            <button onclick="changeNum('reg-number', -1)">-</button>
            <input type="number" id="reg-number" value="1" min="0" max="99">
            <button onclick="changeNum('reg-number', 1)">+</button>
          </div>
        </div>
        <div class="form-group"><label>氏名</label><input type="text" id="reg-name"></div>
        <div class="form-group">
          <label>ポジション</label>
          <select id="reg-pos">
            <option>投手</option><option>捕手</option><option>内野手</option><option>外野手</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-outline" onclick="switchTab('register')">キャンセル</button>
        <button class="btn btn-primary" onclick="addPlayer()">登録する</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbySJYE7XzjON6Vyn1dGcBPzw2kRXatzcPSrSzXrrTr0CDpSaq4uQy7Yaml1Y7Ggx2p9FA/exec';
const CORRECT_PASSWORD = 'seiryo';
let players = [];
let games = [];
let _currentEditingGameId = null;

function checkPassword() {
  if (document.getElementById('pw-input').value === CORRECT_PASSWORD) {
    sessionStorage.setItem('bs_auth_seiryo', '1');
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    loadFromGAS();
  }
}

async function loadFromGAS() {
  showToast('読み込み中...');
  try {
    const res = await fetch(GAS_URL);
    const data = await res.json();
    players = data.players || [];
    games = data.games || [];
    renderAll();
    showToast('読み込み完了');
  } catch(e) { showToast('通信エラー'); }
}

async function saveToGAS(type, data) {
  await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type, data }) });
}

function changeNum(id, delta) {
  const el = document.getElementById(id);
  el.value = Math.max(0, Math.min(99, parseInt(el.value) + delta));
}

function renderAll() {
  const sortedPlayers = [...players].sort((a,b) => a.number - b.number);
  
  // 成績一覧
  document.getElementById('stats-tbody').innerHTML = sortedPlayers.map(p => {
    let pa=0, score=0, rbi=0, sba=0, sb=0;
    games.forEach(g => {
      const s = (g.stats || []).find(st => st.pid === p.id);
      if(s) {
        pa += Number(s.pa || 0); score += Number(s.score || 0);
        rbi += Number(s.rbi || 0); sba += Number(s.sba || 0); sb += Number(s.sb || 0);
      }
    });
    return `<tr><td><span class="player-num">${p.number}</span>${p.name}</td><td>${pa}</td><td>${score}</td><td>${rbi}</td><td>${sba}</td><td>${sb}</td></tr>`;
  }).join('');

  document.getElementById('overview-cards').innerHTML = `
    <div class="stat-card"><div class="label">試合数</div><div class="value">${games.length}</div></div>
    <div class="stat-card"><div class="label">選手数</div><div class="value">${players.length}</div></div>
  `;

  // 試合一覧
  document.getElementById('game-list-wrap').innerHTML = games.map(g => `
    <div class="form-card" style="display:flex; justify-content:space-between; align-items:center; padding:15px;">
      <div><div style="font-size:12px; color:var(--muted);">${g.date}</div><div style="font-weight:bold;">vs ${g.opponent}</div></div>
      <div style="font-family:'Bebas Neue'; font-size:24px; color:var(--accent);">${g.us} - ${g.them}</div>
      <button class="btn btn-outline" style="padding:6px 12px; font-size:12px;" onclick="openStatsEditor(${g.id})">成績入力</button>
    </div>
  `).reverse().join('');

  // 選手一覧
  document.getElementById('player-list-tbody').innerHTML = sortedPlayers.map(p => `
    <tr id="prow-${p.id}">
      <td>${p.number}</td><td>${p.name}</td><td><span class="badge">${p.pos}</span></td>
      <td><button class="btn btn-outline" style="padding:4px 10px; font-size:12px;" onclick="editPlayerMode(${p.id})">編集</button></td>
    </tr>
  `).join('');
}

function editPlayerMode(id) {
  const p = players.find(x => x.id === id);
  const prow = document.getElementById(`prow-${id}`);
  prow.innerHTML = `
    <td colspan="3">
      <div class="form-grid" style="grid-template-columns: 1fr 2fr 1fr;">
        <input type="number" id="epn-${id}" value="${p.number}" style="padding:5px; text-align:center;">
        <input type="text" id="epname-${id}" value="${p.name}" style="padding:5px;">
        <select id="eppos-${id}" style="padding:5px;">
          <option ${p.pos==='投手'?'selected':''}>投手</option>
          <option ${p.pos==='捕手'?'selected':''}>捕手</option>
          <option ${p.pos==='内野手'?'selected':''}>内野手</option>
          <option ${p.pos==='外野手'?'selected':''}>外野手</option>
        </select>
      </div>
    </td>
    <td>
      <div style="display:flex; gap:4px; flex-direction:column;">
        <button class="btn btn-primary" style="padding:4px; font-size:10px;" onclick="updatePlayer(${id})">保存</button>
        <button class="btn btn-danger" style="padding:4px; font-size:10px;" onclick="deletePlayer(${id})">削除</button>
      </div>
    </td>
  `;
}

async function updatePlayer(id) {
  const p = players.find(x => x.id === id);
  p.number = document.getElementById(`epn-${id}`).value;
  p.name = document.getElementById(`epname-${id}`).value;
  p.pos = document.getElementById(`eppos-${id}`).value;
  await saveToGAS('players', players);
  renderAll();
  showToast('更新完了');
}

async function deletePlayer(id) {
  if(!confirm('削除しますか？')) return;
  players = players.filter(p => p.id !== id);
  await saveToGAS('players', players);
  renderAll();
}

function openStatsEditor(gameId) {
  _currentEditingGameId = gameId;
  const game = games.find(g => g.id === gameId);
  document.getElementById('edit-stats-title').textContent = `${game.date} vs ${game.opponent}`;
  
  const sortedPlayers = [...players].sort((a,b) => a.number - b.number);
  document.getElementById('player-edit-stats-list').innerHTML = sortedPlayers.map(p => {
    const s = (game.stats || []).find(st => st.pid === p.id) || {pa:0, score:0, rbi:0, sba:0, sb:0};
    return `<div style="display:grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr 1fr; gap:8px; margin-bottom:10px; align-items:center;">
      <div style="font-size:12px; overflow:hidden;">${p.number} ${p.name}</div>
      <input type="number" id="pa-${p.id}" value="${s.pa}" style="padding:6px; background:#000; border:1px solid #333; color:white; text-align:center;">
      <input type="number" id="sc-${p.id}" value="${s.score}" style="padding:6px; background:#000; border:1px solid #333; color:white; text-align:center;">
      <input type="number" id="rb-${p.id}" value="${s.rbi}" style="padding:6px; background:#000; border:1px solid #333; color:white; text-align:center;">
      <input type="number" id="sa-${p.id}" value="${s.sba}" style="padding:6px; background:#000; border:1px solid #333; color:white; text-align:center;">
      <input type="number" id="sb-${p.id}" value="${s.sb}" style="padding:6px; background:#000; border:1px solid #333; color:white; text-align:center;">
    </div>`;
  }).join('');
  switchTab('edit-stats');
}

async function updateGameStats() {
  const game = games.find(g => g.id === _currentEditingGameId);
  game.stats = players.map(p => ({
    pid: p.id,
    pa: document.getElementById(`pa-${p.id}`).value,
    score: document.getElementById(`sc-${p.id}`).value,
    rbi: document.getElementById(`rb-${p.id}`).value,
    sba: document.getElementById(`sa-${p.id}`).value,
    sb: document.getElementById(`sb-${p.id}`).value
  }));
  await saveToGAS('games', games);
  renderAll();
  switchTab('games');
  showToast('成績保存完了');
}

async function saveGame() {
  const opp = document.getElementById('game-opponent').value;
  if(!opp) return;
  const g = { id: Date.now(), date: document.getElementById('game-date').value, opponent: opp, us: document.getElementById('game-score-us').value, them: document.getElementById('game-score-them').value, stats: [] };
  games.push(g);
  await saveToGAS('games', games);
  renderAll();
  openStatsEditor(g.id);
}

async function addPlayer() {
  const n = document.getElementById('reg-name').value;
  if(!n) return;
  players.push({ id: Date.now(), number: document.getElementById('reg-number').value, name: n, pos: document.getElementById('reg-pos').value });
  await saveToGAS('players', players);
  renderAll();
  switchTab('register');
}

function switchTab(name) {
  const btns = ['stats', 'register', 'games'];
  btns.forEach(b => document.getElementById(`tab-${b}`).classList.toggle('active', b === name || (b==='games' && (name==='add-game'||name==='edit-stats'))));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓ ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('game-date').value = new Date().toISOString().split('T')[0];
  if (sessionStorage.getItem('bs_auth_seiryo') === '1') {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    loadFromGAS();
  }
});
</script>
</body>
</html>
